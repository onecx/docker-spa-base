<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CORS Browser Test</title>
  <style>
    body { font-family: sans-serif; margin: 2rem; }
    button { margin-right: .5rem; padding: .5rem .75rem; }
    pre { background: #f5f5f5; padding: 1rem; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>CORS Browser Test</h1>
  <p>Client origin is this page's URL. Target is localhost:8080 static assets.</p>
  <button id="testJs">Fetch hashed JS</button>
  <button id="testFont">Fetch woff2</button>
  <pre id="out">Ready.</pre>

  <script>
    const out = document.getElementById('out');

    async function run(path) {
      out.textContent = `Fetching ${path} ...`;
      try {
        const res = await fetch(`http://localhost:8080/${path}`, { mode: 'cors' });
        const txt = await res.text();
        out.textContent = [
          `status: ${res.status}`,
          `ok: ${res.ok}`,
          `content-type: ${res.headers.get('content-type')}`,
          `body (first 120): ${txt.slice(0, 120)}`
        ].join('\n');
      } catch (e) {
        out.textContent = `CORS blocked or network error:\n${e}`;
      }
    }

    document.getElementById('testJs').onclick = () => run('a1b2c3d4e5.js');
    document.getElementById('testFont').onclick = () => run('test.woff2');
  </script>
</body>
</html>
