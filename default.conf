# Match request Origin against an explicit origin and/or a configurable regex.
map $http_origin $cors_origin_mapped {
  default "";
  "@@CORS_ALLOW_ORIGIN" $http_origin;
  "~@@CORS_ALLOW_REGEX_ORIGIN" $http_origin;
}

# Only emit the remaining CORS headers when origin matched.
map $cors_origin_mapped $cors_cred_mapped {
  default "";
  "~.+" "@@CORS_ALLOW_CREDENTIALS";
}

map $cors_origin_mapped $cors_header_mapped {
  default "";
  "~.+" "@@CORS_ALLOW_HEADERS";
}

map $cors_origin_mapped $cors_method_mapped {
  default "";
  "~.+" "@@CORS_ALLOW_METHODS";
}

map $cors_origin_mapped $cors_vary_mapped {
  default "";
  "~.+" "Origin";
}

server {

  listen            8080;
  server_name       localhost;
  server_tokens off;
  port_in_redirect  off;
  root              /usr/share/nginx/html;
  index             index.html index.html;
  error_page 404 /custom_404.html;
  error_page 500 /custom_500.html;
  error_page 400 405 406 408 409 410 411 412 413 414 415 416 417 418 421 422 423 424 425 426 428 429 431 451 /custom_4xx.html;
  error_page 501 502 503 504 505 506 507 508 510 511 /custom_5xx.html;
  gzip              on;
  gzip_min_length   1000;
  gzip_types        text/plain application/xml application/javascript application/json text/css font/woff2;
  
  set $cors_enabled @@CORS_ENABLED;
  set $cors_origin "";
  set $cors_cred "";
  set $cors_header "";
  set $cors_method "";
  set $cors_vary "";

  if ($cors_enabled = "true") {
    set $cors_origin $cors_origin_mapped;
    set $cors_cred   $cors_cred_mapped;
    set $cors_header $cors_header_mapped;
    set $cors_method $cors_method_mapped;
    set $cors_vary   $cors_vary_mapped;
  }

  add_header Access-Control-Allow-Origin      $cors_origin;
  add_header Access-Control-Allow-Credentials $cors_cred;
  add_header Access-Control-Allow-Headers     $cors_header;
  add_header Access-Control-Allow-Methods     $cors_method;
  add_header Vary                             $cors_vary;

  # Disable cache by default
  add_header X-Content-Type-Options "nosniff";
  add_header X-Frame-Options "SAMEORIGIN";
  add_header X-XSS-Protection "1; mode=block";
  add_header Cache-Control "private, no-cache, no-store, must-revalidate";
  add_header Expires "Sat, 01 Jan 2000 00:00:00 GMT";
  add_header Pragma no-cache;
  
  include "/etc/nginx/conf.d/locations/*.conf";
}
